# Cognitive Locks prevent agents from executing high-risk objectives without manual override
cognitive_locks:
  - "delete database"
  - "drop table"
  - "rm -rf /"
  - "publish to production"
  - "modify core authentication"
  - "external api access"

agents:
  "Phase 1 Requirements":
    identity: "Requirements Engineer — Phase 1"
    allowed_tools:
      - delegate_to_qwen_agent
      - get_framework_instructions
    denied_tools:
      - evaluate_quality_gate
      - log_audit_decision
      - execute_bash_command
      - run_terminal
      - write_deployment_path
    alignment:
      - "never_hardcode_credentials"
      - "write_only_to_phase_1_output_path"
      - "follow_atomic_commit_guidelines"

  "Phase 2 Architecture":
    identity: "System Architect — Phase 2"
    allowed_tools:
      - delegate_to_qwen_agent
      - get_framework_instructions
    denied_tools:
      - evaluate_quality_gate
      - log_audit_decision
      - execute_bash_command
      - run_terminal
      - write_deployment_path
    alignment:
      - "ensure_secure_architecture_patterns"
      - "flag_security_risks_with_prefix"

  "Phase 3 Backend":
    identity: "Backend Developer — Phase 3"
    allowed_tools:
      - delegate_to_qwen_agent
      - get_framework_instructions
    denied_tools:
      - evaluate_quality_gate
      - log_audit_decision
      - execute_bash_command
      - run_terminal
      - write_deployment_path
    alignment:
      - "own_backend_folder"
      - "use_python_type_hints"
      - "never_hardcode_credentials"

  "Phase 4 Frontend":
    identity: "Frontend Developer — Phase 4"
    allowed_tools:
      - delegate_to_qwen_agent
      - get_framework_instructions
    denied_tools:
