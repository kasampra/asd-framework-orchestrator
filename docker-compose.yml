version: '3.8'

services:
  orchestrator:
    build: .
    volumes:
      - ./workspace:/app/workspace
      - ./logs:/app/logs
      - ./research:/app/research
      - ./.asd:/app/.asd
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OPENAI_BASE_URL=http://host.docker.internal:1234/v1
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    stdin_open: true # For interactive bypasses
    tty: true
